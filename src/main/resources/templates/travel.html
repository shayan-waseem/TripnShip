<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Travel Packages')}"></head>
<body class="text-slate-100 min-h-screen font-sans flex flex-col">
<nav th:replace="~{fragments/layout :: user-nav('travel')}"></nav>

<main class="flex-1 max-w-6xl mx-auto w-full px-6 py-10">
    <div class="mb-8">
        <h1 class="text-3xl font-extrabold">Travel Packages</h1>
        <p class="text-slate-400 text-sm mt-1">Book your next getaway — payment is processed instantly.</p>
    </div>

    <div th:if="${param.error}" class="mb-6 p-4 bg-red-500/20 border border-red-500/30 text-red-300 text-sm rounded-xl">
        Payment could not be completed. Please try again or use a different method.
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div th:each="pkg : ${packages}" class="bg-white/5 border border-white/10 rounded-2xl p-6 flex flex-col hover:border-indigo-500/40 transition shadow-xl">
            <div class="flex justify-between items-start mb-3">
                <h3 class="text-xl font-bold" th:text="${pkg.title}">Package</h3>
                <span class="text-xs font-mono px-2 py-1 rounded-full bg-indigo-500/20 text-indigo-300 border border-indigo-500/30" th:text="${pkg.id}">PKG</span>
            </div>
            <p class="text-slate-400 text-sm mb-4 flex-1" th:text="${pkg.description}">Description</p>
            <p class="text-xs text-slate-500 mb-1"><span th:text="${pkg.origin}">From</span> → <span class="text-indigo-300" th:text="${pkg.destination}">To</span></p>
            <p class="text-xs text-slate-500 mb-4">Slots left: <span th:text="${pkg.availableSlots}">0</span></p>
            <div class="border-t border-white/10 pt-4 flex flex-wrap items-center justify-between gap-3">
                <p class="text-2xl font-black text-emerald-400" th:text="${'$' + pkg.price}">$0</p>
                <form th:action="@{/travel/book}" method="POST" class="flex flex-wrap items-center gap-2">
                    <input type="hidden" name="packageId" th:value="${pkg.id}">
                    <select name="paymentMethod" class="bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-xs text-white">
                        <option value="CARD">Card</option>
                        <option value="BANK">Bank transfer</option>
                    </select>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-4 py-2.5 rounded-xl transition">Book now</button>
                </form>
            </div>
        </div>
    </div>
    <p th:if="${#lists.isEmpty(packages)}" class="text-center text-slate-500 py-12">No packages available right now.</p>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
