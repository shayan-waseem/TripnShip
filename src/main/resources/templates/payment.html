<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Payments')}"></head>
<body class="text-slate-100 min-h-screen font-sans flex flex-col">
<nav th:replace="~{fragments/layout :: user-nav('payment')}"></nav>

<main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="max-w-md w-full bg-white/5 border border-white/10 p-8 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-extrabold mb-1">Payment</h1>
        <p class="text-slate-400 text-xs mb-6">Authorize a sample transaction (demo gateway).</p>
        <form th:action="@{/payment/checkout}" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs uppercase text-slate-400 font-bold mb-2">Amount ($)</label>
                <input type="number" name="amount" value="1200" step="0.01"
                       class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <input type="hidden" name="method" value="CARD">
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 font-bold py-3.5 rounded-xl transition">Pay now</button>
        </form>
        <a href="/travel/history" class="block text-center text-xs text-indigo-400 mt-6 hover:underline">View booking history →</a>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
