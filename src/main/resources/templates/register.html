<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>OceanLink — Create Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center font-sans">
    <div class="w-full max-w-md p-8 bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-purple-600 rounded-xl flex items-center justify-center font-bold text-xl mx-auto mb-3">O</div>
            <h2 class="text-2xl font-extrabold tracking-tight">Join OceanLink</h2>
            <p class="text-gray-400 text-xs mt-1">Start managing your global cargo routing loops and holiday getaways.</p>
        </div>

        <div th:if="${error}" class="mb-4 p-3 bg-red-500/20 border border-red-500/40 text-red-300 text-xs rounded-xl text-center" th:text="${error}"></div>

        <form th:action="@{/signup}" th:object="${user}" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Username</label>
                <input type="text" th:field="*{username}" required placeholder="Choose a username"
                       class="w-full bg-black/40 border border-purple-500/20 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" th:field="*{email}" required placeholder="you@domain.com"
                       class="w-full bg-black/40 border border-purple-500/20 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                <input type="password" th:field="*{password}" required placeholder="••••••••"
                       class="w-full bg-black/40 border border-purple-500/20 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white transition">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Account Type Access Tier</label>
                <select th:field="*{role}" class="w-full bg-black/40 border border-purple-500/20 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white transition">
                    <option value="USER">Standard Customer Access</option>
                    <option value="ADMIN">System Administrator Tier</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-xl transition shadow-lg mt-2">
                Register Account
            </button>
        </form>
        <p class="text-center text-xs text-gray-400 mt-6">Already possess an active profile? <a href="/login" class="text-purple-400 hover:underline">Login here</a></p>
    </div>
</body>
</html>
