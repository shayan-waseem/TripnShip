<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign In - Trip & Ship</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Ultra-premium dark ambient background overlay */
            background: linear-gradient(135deg, rgba(15, 17, 28, 0.95), rgba(8, 9, 15, 0.98)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }
        .neo-glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .neo-glass-card:hover {
            box-shadow: 0 40px 80px rgba(99, 102, 241, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(99, 102, 241, 0.25);
        }
        .glow-input {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.25), inset 0 0 8px rgba(0,0,0,0.5);
            transform: scale(1.01);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="neo-glass-card max-w-md w-full rounded-3xl p-8 space-y-6 relative overflow-hidden">
        
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-pink-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center space-y-2 relative">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 text-xl font-extrabold shadow-lg shadow-indigo-500/10 mb-2">
                T
            </div>
            <h1 class="text-2xl font-black tracking-tight text-white bg-clip-text">Sign in to Trip & Ship</h1>
            <p class="text-xs text-slate-400 font-medium">Travel vectors and logistical architectures unified.</p>
        </div>

        <div th:if="${param.error}" class="bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs p-3 rounded-xl font-medium text-center animate-pulse">
            ⚠️ Invalid credential vectors. Access denied.
        </div>
        <div th:if="${param.logout}" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs p-3 rounded-xl font-medium text-center">
            🔐 Session de-authorized safely.
        </div>

        <form th:action="@{/login}" method="POST" class="space-y-4 relative">
            
            <div class="space-y-1.5">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Username Reference</label>
                <input type="text" name="username" required placeholder="e.g. shayan" 
                       class="glow-input w-full text-xs rounded-xl px-4 py-3 text-slate-200 focus:outline-none">
            </div>

            <div class="space-y-1.5">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Access Secret Key</label>
                <input type="password" name="password" required placeholder="Your account password" 
                       class="glow-input w-full text-xs rounded-xl px-4 py-3 text-slate-200 focus:outline-none">
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs py-3.5 rounded-xl transition-all duration-300 shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/30 active:scale-[0.99] cursor-pointer mt-2">
                Authorize Session
            </button>
        </form>

        <div class="text-center relative pt-2 border-t border-white/5">
            <p class="text-xs text-slate-500">
                No active credentials? 
                <a th:href="@{/register}" class="text-indigo-400 hover:text-indigo-300 font-bold transition-colors ml-1">Sign up free</a>
            </p>
        </div>
    </div>

</body>
</html>
