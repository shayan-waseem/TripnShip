<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | Trip &amp; Ship'">Trip &amp; Ship</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #05050a 0%, #0b0b1e 50%, #05050a 100%); 
        }
        /* Smooth glow pulse animation for premium items */
        @keyframes subtle-pulse {
            0%, 100% { box-shadow: 0 0 12px rgba(99, 102, 241, 0.2); }
            50% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        }
        .premium-glow {
            animation: subtle-pulse 4s infinite ease-in-out;
        }
    </style>
</head>

<body th:fragment="body-class" class="text-slate-100 min-h-screen font-sans antialiased">

<nav th:fragment="user-nav(active)" class="sticky top-0 z-50 flex flex-wrap justify-between items-center gap-4 px-6 md:px-10 py-4 bg-slate-950/40 backdrop-blur-xl border-b border-white/5 shadow-lg">
    <a th:href="@{/home}" class="flex items-center gap-3 group">
        <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center font-bold premium-glow text-white">T</div>
        <span class="text-lg font-bold tracking-tight">Trip <span class="text-indigo-400">&amp;</span> Ship</span>
    </a>
    <div class="flex flex-wrap items-center gap-1 md:gap-2 text-sm">
        <a th:href="@{/home}" th:classappend="${active == 'home'} ? 'bg-indigo-500/15 text-indigo-300 border-indigo-500/40 shadow-[0_0_15px_rgba(99,102,241,0.15)]' : 'text-slate-400 hover:text-white border-transparent hover:bg-white/5'" class="px-3 py-2 rounded-lg border transition-all duration-300">Home</a>
        <a th:href="@{/travel}" th:classappend="${active == 'travel'} ? 'bg-indigo-500/15 text-indigo-300 border-indigo-500/40 shadow-[0_0_15px_rgba(99,102,241,0.15)]' : 'text-slate-400 hover:text-white border-transparent hover:bg-white/5'" class="px-3 py-2 rounded-lg border transition-all duration-300">Travel</a>
        <a th:href="@{/cargo}" th:classappend="${active == 'cargo'} ? 'bg-indigo-500/15 text-indigo-300 border-indigo-500/40 shadow-[0_0_15px_rgba(99,102,241,0.15)]' : 'text-slate-400 hover:text-white border-transparent hover:bg-white/5'" class="px-3 py-2 rounded-lg border transition-all duration-300">Cargo</a>
        <a th:href="@{/travel/history}" th:classappend="${active == 'bookings'} ? 'bg-indigo-500/15 text-indigo-300 border-indigo-500/40 shadow-[0_0_15px_rgba(99,102,241,0.15)]' : 'text-slate-400 hover:text-white border-transparent hover:bg-white/5'" class="px-3 py-2 rounded-lg border transition-all duration-300">Bookings</a>
        <a th:href="@{/tracking}" th:classappend="${active == 'tracking'} ? 'bg-indigo-500/15 text-indigo-300 border-indigo-500/40 shadow-[0_0_15px_rgba(99,102,241,0.15)]' : 'text-slate-400 hover:text-white border-transparent hover:bg-white/5'" class="px-3 py-2 rounded-lg border transition-all duration-300">Tracking</a>
        <a th:href="@{/wishlist}" th:classappend="${active == 'wishlist'} ? 'bg-indigo-500/15 text-indigo-300 border-indigo-500/40 shadow-[0_0_15px_rgba(99,102,241,0.15)]' : 'text-slate-400 hover:text-white border-transparent hover:bg-white/5'" class="px-3 py-2 rounded-lg border transition-all duration-300">Wishlist</a>
        <span th:if="${currentUser != null}" class="hidden md:inline text-slate-500 text-xs px-2" th:text="'Hi, ' + ${currentUser.username}">Hi</span>
        <a th:href="@{/logout}" class="ml-1 px-3 py-2 rounded-lg text-red-400 hover:bg-red-500/10 border border-red-500/20 transition-all text-xs font-semibold">Logout</a>
    </div>
</nav>

<aside th:fragment="admin-sidebar(active)" class="w-66 min-h-screen bg-slate-950/40 backdrop-blur-xl border-r border-white/5 p-6 flex flex-col shrink-0 shadow-[5px_0_25px_-5px_rgba(0,0,0,0.5)]">
    <a th:href="@{/admin/dashboard}" class="flex items-center gap-3 mb-10 group">
        <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center font-bold premium-glow text-white group-hover:scale-105 transition-transform duration-300">T</div>
        <div>
            <span class="font-bold text-sm block tracking-wide text-white">Trip &amp; Ship</span>
            <span class="text-[10px] text-indigo-400 font-mono tracking-widest uppercase">Admin Matrix</span>
        </div>
    </a>
    
    <nav class="space-y-2 text-sm flex-1">
        <a th:href="@{/admin/dashboard}" 
           th:classappend="${active == 'dashboard'} ? 'bg-gradient-to-r from-indigo-600/15 to-transparent text-indigo-300 border-l-2 border-indigo-500 shadow-[inset_8px_0_15px_-5px_rgba(99,102,241,0.2)] font-medium' : 'text-slate-400 hover:bg-white/5 border-l-2 border-transparent hover:text-slate-200'"
           class="block px-4 py-3 rounded-r-xl border-y border-r border-transparent transition-all duration-300">Core Dashboard</a>
        
        <a th:href="@{/admin/users}" 
           th:classappend="${active == 'users'} ? 'bg-gradient-to-r from-indigo-600/15 to-transparent text-indigo-300 border-l-2 border-indigo-500 shadow-[inset_8px_0_15px_-5px_rgba(99,102,241,0.2)] font-medium' : 'text-slate-400 hover:bg-white/5 border-l-2 border-transparent hover:text-slate-200'"
           class="block px-4 py-3 rounded-r-xl border-y border-r border-transparent transition-all duration-300">Manage Users</a>
        
        <a th:href="@{/admin/packages}" 
           th:classappend="${active == 'packages'} ? 'bg-gradient-to-r from-indigo-600/15 to-transparent text-indigo-300 border-l-2 border-indigo-500 shadow-[inset_8px_0_15px_-5px_rgba(99,102,241,0.2)] font-medium' : 'text-slate-400 hover:bg-white/5 border-l-2 border-transparent hover:text-slate-200'"
           class="block px-4 py-3 rounded-r-xl border-y border-r border-transparent transition-all duration-300">Travel Packages</a>
        
        <a th:href="@{/admin/cargo}" 
           th:classappend="${active == 'cargo'} ? 'bg-gradient-to-r from-indigo-600/15 to-transparent text-indigo-300 border-l-2 border-indigo-500 shadow-[inset_8px_0_15px_-5px_rgba(99,102,241,0.2)] font-medium' : 'text-slate-400 hover:bg-white/5 border-l-2 border-transparent hover:text-slate-200'"
           class="block px-4 py-3 rounded-r-xl border-y border-r border-transparent transition-all duration-300">Cargo Shipments</a>

        <a th:href="@{/home}" class="block px-4 py-3 rounded-xl text-slate-500 hover:text-red-400 hover:bg-red-500/5 transition-all duration-300 mt-8 border border-dashed border-slate-800 hover:border-red-500/20 text-center font-medium">
            Exit Admin Matrix
        </a>
    </nav>
    
    <div class="pt-4 border-t border-white/5 flex flex-col gap-1">
        <div class="px-2 py-2 rounded-xl bg-white/5 border border-white/5 flex items-center gap-3 mb-3">
            <div class="w-7 h-7 rounded-lg bg-indigo-500/10 text-indigo-400 flex items-center justify-center font-mono text-xs font-bold">A1</div>
            <div class="overflow-hidden">
                <p class="text-xs font-semibold text-slate-300 truncate">Admin Engine</p>
                <p class="text-[10px] text-slate-500 truncate">admin1@tripnship.com</p>
            </div>
        </div>
        <a th:href="@{/logout}" class="text-xs text-red-400/80 font-semibold hover:text-red-400 transition-colors px-2">Logout Session</a>
    </div>
</aside>

<footer th:fragment="footer" class="text-center py-6 text-slate-600 text-xs border-t border-white/5 mt-auto bg-slate-950/20 backdrop-blur-md">
    Trip &amp; Ship — Travel &amp; Logistics Platform
</footer>

</html>
