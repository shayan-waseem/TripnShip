<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Analytics')}"></head>
<body class="text-slate-100 min-h-screen font-sans flex">
<aside th:replace="~{fragments/layout :: admin-sidebar('analytics')}"></aside>

<main class="flex-1 p-8 md:p-10 max-w-xl">
    <h1 class="text-2xl font-black mb-6">Analytics</h1>
    <div class="space-y-4">
        <div class="flex justify-between p-4 bg-slate-900/50 rounded-xl border border-slate-800">
            <span class="text-slate-400 text-sm">Total revenue</span>
            <span class="text-emerald-400 font-bold" th:text="${'$' + #numbers.formatDecimal(totalRevenue, 1, 2)}">$0</span>
        </div>
        <div class="flex justify-between p-4 bg-slate-900/50 rounded-xl border border-slate-800">
            <span class="text-slate-400 text-sm">Bookings processed</span>
            <span class="font-bold" th:text="${totalBookingsCount}">0</span>
        </div>
        <div class="flex justify-between p-4 bg-slate-900/50 rounded-xl border border-slate-800">
            <span class="text-slate-400 text-sm">Cargo manifests</span>
            <span class="text-indigo-400 font-bold" th:text="${totalShipmentsCount}">0</span>
        </div>
    </div>
</main>
</body>
</html>
