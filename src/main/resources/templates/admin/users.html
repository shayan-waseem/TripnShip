<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Users')}"></head>
<body class="text-slate-100 min-h-screen font-sans flex">
<aside th:replace="~{fragments/layout :: admin-sidebar('users')}"></aside>

<main class="flex-1 p-8 md:p-10">
    <h1 class="text-2xl font-black mb-6">User accounts</h1>
    <div class="overflow-x-auto rounded-2xl border border-slate-800 bg-slate-900/30">
        <table class="w-full text-left text-sm">
            <thead class="text-slate-400 text-xs uppercase border-b border-slate-800">
            <tr><th class="p-4">ID</th><th class="p-4">Username</th><th class="p-4">Email</th><th class="p-4 text-right">Role</th></tr>
            </thead>
            <tbody>
            <tr th:each="u : ${allUsers}" class="border-t border-slate-800 hover:bg-slate-900/50">
                <td class="p-4 font-mono text-indigo-400" th:text="${u.id}">ID</td>
                <td class="p-4 font-medium" th:text="${u.username}">user</td>
                <td class="p-4 text-slate-400" th:text="${u.email}">email</td>
                <td class="p-4 text-right"><span class="px-2 py-1 rounded text-xs bg-slate-800" th:text="${u.role}">ROLE</span></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
