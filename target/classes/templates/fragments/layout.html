<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | Trip &amp; Ship'">Trip &amp; Ship</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
    </style>
</head>

<body th:fragment="body-class" class="text-slate-100 min-h-screen font-sans antialiased">

<nav th:fragment="user-nav(active)" class="sticky top-0 z-50 flex flex-wrap justify-between items-center gap-4 px-6 md:px-10 py-4 bg-slate-950/70 backdrop-blur-xl border-b border-indigo-500/20">
    <a href="/home" class="flex items-center gap-3 group">
        <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center font-bold shadow-lg shadow-indigo-600/30 group-hover:bg-indigo-500 transition">T</div>
        <span class="text-lg font-bold tracking-tight">Trip <span class="text-indigo-400">&amp;</span> Ship</span>
    </a>
    <div class="flex flex-wrap items-center gap-1 md:gap-2 text-sm">
        <a href="/home" th:classappend="${active == 'home'} ? 'bg-indigo-600/20 text-indigo-300 border-indigo-500/40' : 'text-slate-400 hover:text-white border-transparent'"
           class="px-3 py-2 rounded-lg border transition">Home</a>
        <a href="/travel" th:classappend="${active == 'travel'} ? 'bg-indigo-600/20 text-indigo-300 border-indigo-500/40' : 'text-slate-400 hover:text-white border-transparent'"
           class="px-3 py-2 rounded-lg border transition">Travel</a>
        <a href="/cargo" th:classappend="${active == 'cargo'} ? 'bg-indigo-600/20 text-indigo-300 border-indigo-500/40' : 'text-slate-400 hover:text-white border-transparent'"
           class="px-3 py-2 rounded-lg border transition">Cargo</a>
        <a href="/travel/history" th:classappend="${active == 'bookings'} ? 'bg-indigo-600/20 text-indigo-300 border-indigo-500/40' : 'text-slate-400 hover:text-white border-transparent'"
           class="px-3 py-2 rounded-lg border transition">Bookings</a>
        <a href="/tracking" th:classappend="${active == 'tracking'} ? 'bg-indigo-600/20 text-indigo-300 border-indigo-500/40' : 'text-slate-400 hover:text-white border-transparent'"
           class="px-3 py-2 rounded-lg border transition">Tracking</a>
        <a href="/wishlist" th:classappend="${active == 'wishlist'} ? 'bg-indigo-600/20 text-indigo-300 border-indigo-500/40' : 'text-slate-400 hover:text-white border-transparent'"
           class="px-3 py-2 rounded-lg border transition">Wishlist</a>
        <a href="/payment" th:classappend="${active == 'payment'} ? 'bg-indigo-600/20 text-indigo-300 border-indigo-500/40' : 'text-slate-400 hover:text-white border-transparent'"
           class="px-3 py-2 rounded-lg border transition">Pay</a>
        <span th:if="${currentUser != null}" class="hidden md:inline text-slate-500 text-xs px-2" th:text="'Hi, ' + ${currentUser.username}">Hi</span>
        <a href="/logout" class="ml-1 px-3 py-2 rounded-lg text-red-300 hover:bg-red-500/10 border border-red-500/30 transition text-xs font-semibold">Logout</a>
    </div>
</nav>

<aside th:fragment="admin-sidebar(active)" class="w-64 min-h-screen bg-slate-950/80 border-r border-slate-800 p-6 flex flex-col shrink-0">
    <a href="/admin/dashboard" class="flex items-center gap-3 mb-8">
        <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center font-bold">T</div>
        <span class="font-bold text-sm">Admin Panel</span>
    </a>
    <nav class="space-y-1 text-sm flex-1">
        <a href="/admin/dashboard" th:classappend="${active == 'dashboard'} ? 'bg-indigo-600/15 text-indigo-300 border-indigo-500/30' : 'text-slate-400 hover:bg-slate-900 border-transparent'"
           class="block px-4 py-3 rounded-xl border transition">Dashboard</a>
        <a href="/admin/users" th:classappend="${active == 'users'} ? 'bg-indigo-600/15 text-indigo-300 border-indigo-500/30' : 'text-slate-400 hover:bg-slate-900 border-transparent'"
           class="block px-4 py-3 rounded-xl border transition">Users</a>
        <a href="/admin/packages" th:classappend="${active == 'packages'} ? 'bg-indigo-600/15 text-indigo-300 border-indigo-500/30' : 'text-slate-400 hover:bg-slate-900 border-transparent'"
           class="block px-4 py-3 rounded-xl border transition">Travel Packages</a>
        <a href="/admin/cargo" th:classappend="${active == 'cargo'} ? 'bg-indigo-600/15 text-indigo-300 border-indigo-500/30' : 'text-slate-400 hover:bg-slate-900 border-transparent'"
           class="block px-4 py-3 rounded-xl border transition">Cargo Shipments</a>
        <a href="/admin/analytics" th:classappend="${active == 'analytics'} ? 'bg-indigo-600/15 text-indigo-300 border-indigo-500/30' : 'text-slate-400 hover:bg-slate-900 border-transparent'"
           class="block px-4 py-3 rounded-xl border transition">Analytics</a>
        <a href="/home" class="block px-4 py-3 rounded-xl text-slate-500 hover:text-white transition mt-4">← Customer portal</a>
    </nav>
    <a href="/logout" class="text-xs text-red-400 font-semibold hover:underline pt-6 border-t border-slate-800">Logout</a>
</aside>

<footer th:fragment="footer" class="text-center py-6 text-slate-600 text-xs border-t border-slate-800/80 mt-auto">
    Trip &amp; Ship — Travel &amp; Logistics Platform
</footer>

</html>
