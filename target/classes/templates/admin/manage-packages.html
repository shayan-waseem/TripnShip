<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Travel Packages')}"></head>
<body class="text-slate-100 min-h-screen font-sans flex">
<aside th:replace="~{fragments/layout :: admin-sidebar('packages')}"></aside>

<main class="flex-1 p-8 md:p-10">
    <h1 class="text-2xl font-black mb-6">Travel packages catalog</h1>
    <div class="space-y-4">
        <div th:each="pkg : ${packages}" class="p-5 rounded-2xl bg-slate-900/40 border border-slate-800 flex flex-wrap justify-between gap-4">
            <div>
                <p class="font-mono text-xs text-indigo-400 mb-1" th:text="${pkg.id}">PKG</p>
                <h3 class="font-bold text-lg" th:text="${pkg.title}">Title</h3>
                <p class="text-slate-400 text-sm mt-1" th:text="${pkg.description}">Desc</p>
                <p class="text-xs text-slate-500 mt-2"><span th:text="${pkg.origin}">A</span> → <span th:text="${pkg.destination}">B</span></p>
            </div>
            <div class="text-right">
                <p class="text-2xl font-black text-emerald-400" th:text="${'$' + pkg.price}">$0</p>
                <p class="text-xs text-slate-400 mt-1">Slots: <span th:text="${pkg.availableSlots}">0</span></p>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(packages)}" class="text-slate-500 italic">No packages in database.</p>
    </div>
</main>
</body>
</html>
