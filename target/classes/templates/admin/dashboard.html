<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>
<body class="text-slate-100 min-h-screen font-sans flex">
<aside th:replace="~{fragments/layout :: admin-sidebar('dashboard')}"></aside>

<main class="flex-1 p-8 md:p-10 overflow-y-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-black">Operations dashboard</h1>
        <p class="text-slate-400 text-sm mt-1">Platform overview — users, bookings, and cargo.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
        <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-2xl">
            <p class="text-xs uppercase text-slate-400 font-bold mb-1">Total revenue</p>
            <p class="text-3xl font-black text-emerald-400" th:text="${'$' + #numbers.formatDecimal(revenue, 1, 2)}">$0</p>
        </div>
        <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-2xl">
            <p class="text-xs uppercase text-slate-400 font-bold mb-1">Bookings</p>
            <p class="text-3xl font-black" th:text="${bookingsCount}">0</p>
        </div>
        <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-2xl">
            <p class="text-xs uppercase text-slate-400 font-bold mb-1">Shipments</p>
            <p class="text-3xl font-black text-indigo-400" th:text="${shipmentsCount}">0</p>
        </div>
    </div>

    <div class="bg-slate-900/30 border border-slate-800 rounded-2xl p-6 mb-8">
        <h3 class="font-bold mb-4">Users</h3>
        <div class="overflow-x-auto text-xs">
            <table class="w-full text-left">
                <thead class="text-slate-400 border-b border-slate-800">
                <tr><th class="pb-2">ID</th><th class="pb-2">Username</th><th class="pb-2">Email</th><th class="pb-2 text-right">Role</th></tr>
                </thead>
                <tbody>
                <tr th:each="u : ${allUsers}" class="border-b border-slate-900">
                    <td class="py-2 font-mono text-indigo-400" th:text="${u.id}">ID</td>
                    <td class="py-2" th:text="${u.username}">user</td>
                    <td class="py-2 text-slate-400" th:text="${u.email}">email</td>
                    <td class="py-2 text-right" th:text="${u.role}">ROLE</td>
                </tr>
                </tbody>
            </table>
        </div>
        <a href="/admin/users" class="text-xs text-indigo-400 mt-4 inline-block hover:underline">Manage all users →</a>
    </div>

    <div class="bg-slate-900/30 border border-slate-800 rounded-2xl p-6">
        <h3 class="font-bold mb-4">Recent bookings</h3>
        <div class="overflow-x-auto text-xs">
            <table class="w-full text-left">
                <thead class="text-slate-400 border-b border-slate-800">
                <tr><th class="pb-2">ID</th><th class="pb-2">User</th><th class="pb-2">Type</th><th class="pb-2 text-right">Price</th></tr>
                </thead>
                <tbody>
                <tr th:each="bk : ${allBookings}" class="border-b border-slate-900">
                    <td class="py-2 font-mono text-indigo-400" th:text="${bk.id}">BKG</td>
                    <td class="py-2 font-mono" th:text="${bk.userId}">USR</td>
                    <td class="py-2" th:text="${bk.type}">type</td>
                    <td class="py-2 text-right text-emerald-400 font-bold" th:text="${'$' + #numbers.formatDecimal(bk.price, 1, 2)}">$0</td>
                </tr>
                <tr th:if="${#lists.isEmpty(allBookings)}"><td colspan="4" class="py-4 text-slate-500 italic text-center">No bookings yet.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
