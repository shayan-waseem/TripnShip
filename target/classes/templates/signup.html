<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Sign Up - Trip & Ship')}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Premium Dark Ambient Travel Imagery Overlay Pattern */
            background: linear-gradient(135deg, rgba(15, 17, 28, 0.95), rgba(8, 9, 15, 0.98)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }
        .neo-glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .neo-glass-card:hover {
            box-shadow: 0 40px 80px rgba(236, 72, 153, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(236, 72, 153, 0.25);
        }
        .glow-input {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-input:focus {
            border-color: #ec4899;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.25), inset 0 0 8px rgba(0,0,0,0.5);
            transform: scale(1.01);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="neo-glass-card max-w-md w-full rounded-3xl p-8 space-y-6 relative overflow-hidden">
        
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-pink-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center space-y-2 relative">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-pink-600/20 text-pink-400 border border-pink-500/30 text-xl font-extrabold shadow-lg shadow-pink-500/10 mb-2">
                T
            </div>
            <h1 class="text-2xl font-black tracking-tight text-white">Create your account</h1>
            <p class="text-xs text-slate-400 font-medium">Join Trip & Ship architecture matrix in seconds.</p>
        </div>

        <div th:if="${error}" class="bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs p-3 rounded-xl font-medium text-center animate-pulse" th:text="${error}">
            ⚠️ Validation or registration mismatch occurred.
        </div>

        <form th:action="@{/signup}" th:object="${user}" method="POST" class="space-y-4 relative">
            
            <div class="space-y-1.5">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Desired Username</label>
                <input type="text" th:field="*{username}" required placeholder="Pick a unique handle" 
                       class="glow-input w-full text-xs rounded-xl px-4 py-3 text-slate-200 focus:outline-none">
            </div>

            <div class="space-y-1.5">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Email Coordinate Vector</label>
                <input type="email" th:field="*{email}" required placeholder="you@domain.com" 
                       class="glow-input w-full text-xs rounded-xl px-4 py-3 text-slate-200 focus:outline-none">
            </div>

            <div class="space-y-1.5">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Secure Password Architecture</label>
                <input type="password" th:field="*{password}" required minlength="6" placeholder="Choose a robust password" 
                       class="glow-input w-full text-xs rounded-xl px-4 py-3 text-slate-200 focus:outline-none">
            </div>

            <div class="space-y-1.5">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Account Access Blueprint Node</label>
                <select th:field="*{role}" class="glow-input w-full text-xs rounded-xl px-4 py-3 text-slate-300 focus:outline-none cursor-pointer">
                    <option value="ROLE_USER">👥 Standard Client Profile Terminal</option>
                    <option value="ROLE_ADMIN">🛡️ System Controller Core (Admin)</option>
                </select>
            </div>

            <button type="submit" 
                    class="w-full bg-gradient-to-r from-pink-600 to-indigo-600 hover:from-pink-500 hover:to-indigo-500 text-white font-bold text-xs py-3.5 rounded-xl transition-all duration-300 shadow-md active:scale-[0.99] cursor-pointer mt-2">
                Register Credentials
            </button>
        </form>

        <div class="text-center relative pt-2 border-t border-white/5">
            <p class="text-xs text-slate-500">
                Already registered inside the system? 
                <a href="/login" class="text-pink-400 hover:text-pink-300 font-bold transition-colors ml-1">Sign in</a>
            </p>
        </div>
    </div>

</body>
</html>
