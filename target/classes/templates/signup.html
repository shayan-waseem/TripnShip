<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign Up')}"></head>
<body class="text-slate-100 min-h-screen flex items-center justify-center font-sans px-4">
<div class="w-full max-w-md p-8 bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 shadow-2xl">
    <div class="text-center mb-8">
        <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center font-bold text-xl mx-auto mb-3">T</div>
        <h2 class="text-2xl font-extrabold tracking-tight">Create your account</h2>
        <p class="text-slate-400 text-xs mt-1">Join Trip &amp; Ship in seconds.</p>
    </div>

    <div th:if="${error}" class="mb-4 p-3 bg-red-500/20 border border-red-500/40 text-red-300 text-sm rounded-xl text-center" th:text="${error}"></div>

    <form th:action="@{/signup}" th:object="${user}" method="POST" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
            <input type="text" th:field="*{username}" required class="w-full bg-black/40 border border-indigo-500/20 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email</label>
            <input type="email" th:field="*{email}" required class="w-full bg-black/40 border border-indigo-500/20 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
            <input type="password" th:field="*{password}" required minlength="6" class="w-full bg-black/40 border border-indigo-500/20 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
        </div>
        <input type="hidden" th:field="*{role}" value="USER">
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition">Sign Up</button>
    </form>
    <p class="text-center text-xs text-slate-400 mt-6">Already registered? <a href="/login" class="text-indigo-400 hover:underline">Sign in</a></p>
</div>
</body>
</html>
